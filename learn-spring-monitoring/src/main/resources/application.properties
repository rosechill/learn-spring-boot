spring.application.name=learn-spring-monitoring

spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.url= jdbc:mysql://localhost:3306/learn_spring_monitoring
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000

info.app=Learn Spring Monitoring
info.version=1.0.0
info.author=Jiwon Jiwon
info.website=https://something.com

management.endpoints.web.exposure.include=metrics, scheduledtasks, threaddump, heapdump, beans, health, info, configprops, env, loggers

management.endpoint.beans.enabled=true
management.endpoint.health.enabled=true
management.endpoint.health.show-details=always
management.configprops.enabled=true
management.endpoint.env.enabled=true
management.endpoint.loggers.enabled=true
management.endpoint.heapdump.enabled=true
management.endpoint.threaddump.enabled=true
management.endpoint.scheduledtasks.enabled=true
management.endpoint.metrics.enabled=true

management.endpoint.info.enabled=true
management.info.env.enabled=true
management.info.os.enabled=true
management.info.java.enabled=true

management.endpoint.configprops.show-values=always
management.endpoint.env.show-values=always
